[images]
  remote_images = ["https://source.unsplash.com/.*", "https://images.unsplash.com/.*", "https://ext.same-assets.com/.*", "https://ugc.same-assets.com/.*"]

[build]
  command = "bun run build && bun run export"
  publish = "out"

[build.environment]
  # Remove the NETLIFY_NEXT_PLUGIN_SKIP variable to allow the plugin to work
  # NETLIFY_NEXT_PLUGIN_SKIP = "true"  <-- This is removed

[[plugins]]
  package = "@netlify/plugin-nextjs"
