[build]
  command = "bun run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "18"

# Required for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Handle image domains
[images]
  remote_images = [
    "https://source.unsplash.com/.*",
    "https://images.unsplash.com/.*",
    "https://ext.same-assets.com/.*",
    "https://ugc.same-assets.com/.*"
  ]